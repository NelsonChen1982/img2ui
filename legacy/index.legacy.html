<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pic to UI — Image → Design System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Datatype&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; background:#fafafa; color:#222; min-height:100vh; display:flex; flex-direction:column; }
    /* English font override */
    h1, h2, h3, .en-font, .brand-title, .feature-title, .cta-btn { font-family: 'Datatype', -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
    .step-content { display: none; }
    .step-content.active { display: block; }
    .drop-zone { border: 2px dashed #d0d0d0; transition: all .2s; }
    .drop-zone.drag-over { border-color: #222; background: rgba(0,0,0,.02); }
    @keyframes scan { 0%{top:0;opacity:1} 92%{opacity:1} 100%{top:100%;opacity:0} }
    .scan-line { position:absolute;left:0;right:0;top:0;height:2px;background:linear-gradient(90deg,transparent,#999,transparent);animation:scan 2.2s ease-in-out infinite;box-shadow:0 0 8px 1px rgba(0,0,0,.1); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp .4s ease forwards; }
    .wiz-bar { display:flex;align-items:center;justify-content:center;gap:0;padding:0 20px; }
    .wiz-step { display:flex;align-items:center;gap:6px;padding:10px 0;cursor:default;position:relative; }
    .wiz-step .wiz-num { width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .2s; }
    .wiz-step .wiz-label { font-size:12px;font-weight:500;transition:color .2s;white-space:nowrap; }
    .wiz-line { width:28px;height:1.5px;background:#ddd;flex-shrink:0;transition:background .2s; }
    .wiz-line.done { background:#222; }
    .tok-card { background:#fff;border:1px solid #e8e8e8;border-radius:14px;padding:24px;margin-bottom:14px; }
    .tok-label { font-size:11px;font-weight:700;letter-spacing:.1em;color:#999;margin-bottom:16px; }
    #anno-canvas { cursor:crosshair;display:block; }
    .type-btn { display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;cursor:pointer;border:1.5px solid transparent;font-size:13px;font-weight:500;transition:all .15s;color:#666;background:#f5f5f5; }
    .type-btn:hover { background:#eee;color:#333; }
    .type-btn.selected { border-color:var(--tc);background:var(--tc-alpha);color:var(--tc);font-weight:600; }
    .anno-tag { display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer; }
    .kit-section { border-radius:16px;padding:24px;margin-bottom:16px; }
    .kit-section-label { font-size:10px;font-weight:700;letter-spacing:.1em;margin-bottom:16px;opacity:.4; }
    .color-chip { position:relative;cursor:pointer; }
    .color-chip input[type=color] { position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%; }
    .ratio-bar { height:32px;border-radius:8px;display:flex;overflow:hidden;border:1px solid #e0e0e0;position:relative;user-select:none; }
    .ratio-seg { transition:none; display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;min-width:20px; }
    .ratio-handle { width:6px;cursor:col-resize;background:rgba(0,0,0,.25);transition:background .15s;position:relative;z-index:2;flex-shrink:0; }
    .ratio-handle:hover,.ratio-handle.dragging { background:rgba(0,0,0,.5); }
    /* Language dropdown */
    .lang-dropdown { position:relative; }
    .lang-toggle { padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #ddd;background:#fff;color:#555;display:flex;align-items:center;gap:4px; }
    .lang-toggle:hover { background:#f5f5f5; }
    .lang-menu { position:absolute;right:0;top:calc(100% + 4px);background:#fff;border:1px solid #e0e0e0;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1);overflow:hidden;display:none;z-index:100;min-width:120px; }
    .lang-menu.open { display:block; }
    .lang-menu-item { padding:8px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;color:#555; }
    .lang-menu-item:hover { background:#f5f5f5; }
    .lang-menu-item.active { font-weight:700;color:#222; }
    /* CTA button */
    .cta-btn { display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 36px;border-radius:12px;font-size:16px;font-weight:700;border:none;cursor:pointer;background:#222;color:#fff;transition:all .15s;box-shadow:0 4px 16px rgba(0,0,0,.12); }
    .cta-btn:hover { background:#000;box-shadow:0 6px 24px rgba(0,0,0,.18);transform:translateY(-1px); }
    .cta-btn:disabled { opacity:.4;cursor:default;transform:none;box-shadow:none; }
    /* Feature cards */
    .feature-card { flex:1;min-width:140px;padding:20px 16px;border-radius:14px;background:#fff;border:1px solid #eee;text-align:center;transition:all .2s; }
    .feature-card:hover { border-color:#ddd;box-shadow:0 4px 16px rgba(0,0,0,.05);transform:translateY(-2px); }
    .feature-icon { font-size:28px;margin-bottom:10px; }
    .feature-title { font-size:13px;font-weight:700;color:#333; }
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-thumb { background:#ccc;border-radius:99px; }
    ::-webkit-scrollbar-track { background:transparent; }
    .hidden { display:none!important; }
    /* Fixed footer action bar */
    .action-footer { position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8e8e8;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;z-index:50;box-shadow:0 -2px 12px rgba(0,0,0,.04);transition:transform .25s; }
    .action-footer.hidden { transform:translateY(100%);pointer-events:none; }
    .action-footer .af-left, .action-footer .af-right { display:flex;gap:8px;align-items:center; }
    .action-footer .af-center { font-size:12px;color:#aaa;font-weight:500; }
    .af-btn { padding:8px 20px;font-size:13px;border-radius:10px;cursor:pointer;font-weight:600;transition:all .15s; }
    .af-btn-back { border:1px solid #ddd;background:#fff;color:#666; }
    .af-btn-back:hover { background:#f5f5f5; }
    .af-btn-next { border:none;background:#222;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1); }
    .af-btn-next:hover { background:#000;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.15); }
    .af-btn-secondary { padding:6px 14px;font-size:12px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#555;cursor:pointer; }
    .af-btn-secondary:hover { background:#f5f5f5; }
    @keyframes processing { 0%{width:0} 100%{width:100%} }
    .proc-bar { height:4px;background:#222;border-radius:99px;animation:processing 2.5s ease-out forwards; }
    /* MOBILE */
    @media (max-width: 768px) {
      main { padding: 16px !important; padding-bottom:80px !important; }
      .action-footer { padding:10px 16px; }
      .af-btn { padding:8px 14px;font-size:12px; }
      .action-footer .af-center { display:none; }
      .wiz-bar { overflow-x:auto;justify-content:flex-start;padding:0 12px;gap:0; }
      .wiz-step .wiz-label { display:none; }
      .wiz-line { width:16px; }
      .feature-card { min-width:120px;padding:14px 10px; }
      .feature-icon { font-size:22px; }
      .feature-title { font-size:11px; }
      #type-panel { flex-wrap:nowrap !important;overflow-x:auto; }
      #type-panel-wrap { padding:8px 10px; }
      #canvas-wrap { min-height:260px !important; }
      #step-7 > div:first-child { flex-direction:column !important;gap:10px; }
      #step-7 > div:first-child > div:last-child { flex-wrap:wrap; }
      #step-7 > div:last-child { flex-direction:column !important; }
      #json-panel { width:100% !important;position:static !important;max-height:400px !important; }
      #ui-kit-render { min-width:0; }
      .cta-btn { width:100%;padding:14px 24px; }
      .type-btn { font-size:11px;padding:6px 8px; }
      .tok-card { padding:14px; }
      .kit-section { padding:16px; }
      h1 { font-size:22px !important; }
    }
    @media (max-width: 480px) {
      .wiz-step .wiz-num { width:22px;height:22px;font-size:9px; }
      .cta-btn { font-size:14px;padding:12px 20px; }
    }
  </style>
</head>
<body>

<!-- HEADER + WIZARD -->
<header style="background:#fff;border-bottom:1px solid #e8e8e8;flex-shrink:0;">
  <div style="display:flex;align-items:center;justify-content:center;padding:0 24px;height:50px;position:relative;">
    <!-- Center: logo + brand -->
    <div style="display:flex;align-items:center;gap:8px;">
      <img src="logo.jpg" alt="" style="width:28px;height:28px;border-radius:7px;">
      <span class="brand-title" style="font-size:15px;font-weight:800;letter-spacing:.06em;color:#222;">PIC TO UI</span>
      <!-- step title removed; logo + brand only -->
    </div>
    <!-- Right: nav buttons + lang dropdown -->
    <div style="position:absolute;right:20px;display:flex;gap:8px;align-items:center;">
      <!-- nav buttons removed; using fixed footer instead -->
      <!-- API Provider Selector -->
      <div class="lang-dropdown">
        <button class="lang-toggle" onclick="toggleProviderMenu()" id="provider-toggle-btn" title="AI Provider" style="font-size:11px;padding:4px 8px;">
          <span style="font-size:12px;">⚡</span>
          <span id="provider-current" style="font-size:10px;">Auto</span>
          <span style="font-size:8px;opacity:.5;">▼</span>
        </button>
        <div class="lang-menu" id="provider-menu" style="min-width:160px;">
          <div class="lang-menu-item active" data-provider="auto" onclick="setProvider('auto')">⚡ Auto (cheapest)</div>
          <div class="lang-menu-item" data-provider="claude-haiku" onclick="setProvider('claude-haiku')">🟣 Claude Haiku</div>
          <div class="lang-menu-item" data-provider="claude-sonnet" onclick="setProvider('claude-sonnet')">🟣 Claude Sonnet</div>
          <div class="lang-menu-item" data-provider="gpt4o-mini" onclick="setProvider('gpt4o-mini')">🟢 GPT-4o Mini</div>
          <div class="lang-menu-item" data-provider="gpt4o" onclick="setProvider('gpt4o')">🟢 GPT-4o</div>
          <div class="lang-menu-item" data-provider="gemini-flash" onclick="setProvider('gemini-flash')">🔵 Gemini Flash</div>
        </div>
      </div>
      <!-- CSS Framework Selector -->
      <div class="lang-dropdown">
        <button class="lang-toggle" onclick="toggleCSSFWMenu()" style="font-size:11px;padding:4px 8px;">
          <span style="font-size:12px;">{}</span>
          <span id="cssfw-current" style="font-size:10px;">Tailwind</span>
          <span style="font-size:8px;opacity:.5;">▼</span>
        </button>
        <div class="lang-menu" id="cssfw-menu" style="min-width:180px;">
          <div class="lang-menu-item active" data-cssfw="tailwind" onclick="setCSSFW('tailwind')">🎨 Tailwind CSS</div>
          <div class="lang-menu-item" data-cssfw="vanilla" onclick="setCSSFW('vanilla')">📝 Vanilla CSS</div>
          <div class="lang-menu-item" data-cssfw="cssvar" onclick="setCSSFW('cssvar')">🔧 CSS Variables</div>
        </div>
      </div>
      <div class="lang-dropdown">
        <button class="lang-toggle" onclick="toggleLangMenu()" id="lang-toggle-btn">
          <span id="lang-current">中文</span>
          <span style="font-size:8px;opacity:.5;">▼</span>
        </button>
        <div class="lang-menu" id="lang-menu">
          <div class="lang-menu-item active" data-lang="zh" onclick="setLang('zh')">🇹🇼 中文</div>
          <div class="lang-menu-item" data-lang="en" onclick="setLang('en')">🇺🇸 English</div>
          <div class="lang-menu-item" data-lang="ja" onclick="setLang('ja')">🇯🇵 日本語</div>
        </div>
      </div>
    </div>
  </div>
  <div id="wizard-bar" class="wiz-bar" style="padding-bottom:10px;"></div>
</header>

<main style="flex:1;padding:36px 28px;overflow:auto;background:#fafafa;">

  <!-- STEP 1: Upload -->
  <div id="step-1" class="step-content" style="max-width:720px;margin:0 auto;">
    <!-- Intro / what is this tool -->
    <div id="s1-intro" style="text-align:center;margin-bottom:40px;padding-top:20px;">
      <img src="logo.jpg" alt="Pic to UI" style="width:96px;height:96px;border-radius:24px;margin:0 auto 20px;display:block;box-shadow:0 6px 24px rgba(0,0,0,.1);">
      <h1 id="s1-title" style="font-size:34px;font-weight:800;color:#111;margin-bottom:12px;line-height:1.2;"></h1>
      <p id="s1-desc" style="color:#777;font-size:16px;line-height:1.7;max-width:540px;margin:0 auto 28px;"></p>
      <div id="s1-features" style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;"></div>
    </div>
    <div id="drop-zone" class="drop-zone" style="border-radius:20px;padding:44px 24px;cursor:pointer;text-align:center;background:#fff;"
      onclick="document.getElementById('file-input').click()"
      ondragover="handleDragOver(event)" ondragleave="handleDragLeave()" ondrop="handleDrop(event)">
      <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
      <div id="upload-placeholder">
        <div style="font-size:44px;margin-bottom:12px;opacity:.3;">📁</div>
        <div id="s1-drop" style="font-weight:700;color:#555;margin-bottom:6px;font-size:16px;"></div>
        <div id="s1-hint" style="color:#aaa;font-size:14px;"></div>
      </div>
      <div id="upload-preview" style="display:none;">
        <img id="preview-img" style="max-height:280px;object-fit:contain;border-radius:12px;margin:0 auto;display:block;" alt="">
        <div id="preview-fname" style="margin-top:12px;font-size:14px;color:#999;"></div>
        <div id="s1-reselect" style="margin-top:4px;font-size:12px;color:#aaa;"></div>
      </div>
    </div>
    <!-- Email gate + CTA -->
    <div id="email-gate" style="margin-top:20px;max-width:420px;margin-left:auto;margin-right:auto;">
      <div style="display:flex;gap:8px;align-items:center;">
        <div style="flex:1;">
          <input type="email" id="email-input" placeholder="you@example.com"
            style="width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid #ddd;font-size:14px;outline:none;transition:border-color .2s;background:#fff;color:#333;"
            oninput="validateEmailGate()" onkeydown="if(event.key==='Enter')handleNext()">
        </div>
        <button id="s1-cta-btn" class="cta-btn" onclick="handleNext()" disabled style="white-space:nowrap;">
          <span id="s1-cta-text"></span> <span style="font-size:18px;">→</span>
        </button>
      </div>
      <div id="email-error" style="font-size:11px;color:#e05050;margin-top:4px;display:none;min-height:16px;"></div>
      <div id="email-hint" style="margin-top:8px;font-size:12px;color:#aaa;text-align:center;"></div>
      <div id="rate-limit-notice" style="margin-top:6px;font-size:11px;color:#bbb;text-align:center;display:none;"></div>
    </div>
    <p id="s1-local" style="margin-top:16px;text-align:center;font-size:12px;color:#bbb;"></p>
    <!-- Dev Settings (local testing) -->
    <div style="margin-top:24px;max-width:420px;margin-left:auto;margin-right:auto;">
      <div onclick="document.getElementById('dev-settings').classList.toggle('hidden');this.querySelector('span:last-child').textContent=document.getElementById('dev-settings').classList.contains('hidden')?'▸':'▾';"
        style="cursor:pointer;font-size:11px;color:#ccc;display:flex;align-items:center;gap:4px;justify-content:center;user-select:none;">
        <span id="dev-toggle-label">⚙ Dev Settings</span> <span>▸</span>
      </div>
      <div id="dev-settings" class="hidden" style="margin-top:8px;padding:14px;border-radius:10px;border:1px dashed #e0e0e0;background:#fafafa;">
        <div id="dev-mode-label" style="font-size:10px;font-weight:700;color:#aaa;letter-spacing:.06em;margin-bottom:8px;">LOCAL TESTING MODE</div>
        <div id="dev-desc" style="font-size:11px;color:#999;margin-bottom:10px;"></div>
        <div style="margin-bottom:8px;">
          <label style="font-size:10px;font-weight:600;color:#888;"><span id="dev-lbl-base">API Base URL</span> <span id="dev-lbl-base-hint" style="font-weight:400;color:#bbb;"></span></label>
          <input id="dev-api-base" type="text" placeholder="https://your-worker.workers.dev"
            style="width:100%;padding:8px 10px;border-radius:6px;border:1px solid #ddd;font-size:12px;font-family:monospace;margin-top:3px;outline:none;"
            value="" oninput="saveDevSettings()">
        </div>
        <div style="margin-bottom:8px;">
          <label id="dev-lbl-anthropic" style="font-size:10px;font-weight:600;color:#888;">Anthropic API Key</label>
          <input id="dev-anthropic-key" type="password" placeholder="sk-ant-..."
            style="width:100%;padding:8px 10px;border-radius:6px;border:1px solid #ddd;font-size:12px;font-family:monospace;margin-top:3px;outline:none;"
            oninput="saveDevSettings()">
        </div>
        <div style="margin-bottom:8px;">
          <label style="font-size:10px;font-weight:600;color:#888;"><span id="dev-lbl-openai">OpenAI API Key</span> <span id="dev-lbl-openai-opt" style="font-weight:400;color:#bbb;"></span></label>
          <input id="dev-openai-key" type="password" placeholder="sk-..."
            style="width:100%;padding:8px 10px;border-radius:6px;border:1px solid #ddd;font-size:12px;font-family:monospace;margin-top:3px;outline:none;"
            oninput="saveDevSettings()">
        </div>
        <div style="margin-bottom:8px;">
          <label style="font-size:10px;font-weight:600;color:#888;"><span id="dev-lbl-gemini">Gemini API Key</span> <span id="dev-lbl-gemini-opt" style="font-weight:400;color:#bbb;"></span></label>
          <input id="dev-gemini-key" type="password" placeholder="AIza..."
            style="width:100%;padding:8px 10px;border-radius:6px;border:1px solid #ddd;font-size:12px;font-family:monospace;margin-top:3px;outline:none;"
            oninput="saveDevSettings()">
        </div>
        <div id="dev-status" style="font-size:10px;color:#555;margin-top:6px;display:none;"></div>
      </div>
    </div>
  </div>

    <!-- STEP 2: Analyzing -->
    <div id="step-2" class="step-content" style="max-width:760px;margin:0 auto;">
      <h1 id="s2-title" style="font-size:26px;font-weight:700;color:#111;margin-bottom:6px;"></h1>
      <p id="s2-desc" style="color:#888;font-size:15px;margin-bottom:28px;"></p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <div style="border-radius:14px;overflow:hidden;position:relative;background:#f0f0f0;max-height:320px;">
          <img id="analyze-img" style="width:100%;object-fit:cover;opacity:.8;max-height:320px;" alt="">
          <div style="position:absolute;inset:0;background:rgba(0,0,0,.02);"><div class="scan-line"></div></div>
          <div id="scan-status" style="position:absolute;bottom:10px;left:10px;font-size:11px;font-family:monospace;color:rgba(0,0,0,.3);"></div>
        </div>
        <div id="analysis-tasks" style="display:flex;flex-direction:column;gap:8px;"></div>
      </div>
    </div>

    <!-- STEP 3: Color Configuration -->
    <div id="step-3" class="step-content" style="max-width:880px;margin:0 auto;">
      <h1 id="s3-title" style="font-size:26px;font-weight:700;color:#111;margin-bottom:6px;"></h1>
      <p id="s3-desc" style="color:#888;font-size:15px;margin-bottom:28px;"></p>
      <!-- Palette Section -->
      <div class="tok-card">
        <div class="tok-label" id="s3-palette-label"></div>
        <div id="palette-grid" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;"></div>
      </div>
      <!-- Semantic Slots Section -->
      <div class="tok-card">
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:16px;">
          <div class="tok-label" id="s3-slots-label" style="margin-bottom:0;"></div>
          <span id="s3-slots-desc" style="font-size:11px;color:#bbb;"></span>
        </div>
        <div id="slot-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;"></div>
      </div>
    </div>

    <!-- STEP 4: Token Review -->
    <div id="step-4" class="step-content" style="max-width:840px;margin:0 auto;">
      <h1 id="s4-title" style="font-size:26px;font-weight:700;color:#111;margin-bottom:6px;"></h1>
      <p id="s4-desc" style="color:#888;font-size:15px;margin-bottom:28px;"></p>
      <div class="tok-card">
        <div class="tok-label">COLOR PALETTE</div>
        <div id="ds-colors" style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;"></div>
      </div>
      <div class="tok-card">
        <div class="tok-label">TYPOGRAPHY SCALE</div>
        <div id="ds-typo"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="tok-card" style="margin-bottom:0;"><div class="tok-label">SPACING SCALE</div><div id="ds-spacing" style="display:flex;align-items:flex-end;gap:6px;"></div></div>
        <div class="tok-card" style="margin-bottom:0;"><div class="tok-label">BORDER RADIUS</div><div id="ds-radius" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;"></div></div>
      </div>
    </div>

    <!-- STEP 5: Annotation -->
    <div id="step-5" class="step-content" style="max-width:1200px;margin:0 auto;">
      <div style="margin-bottom:14px;">
        <h1 id="s5-title" style="font-size:26px;font-weight:700;color:#111;"></h1>
        <p id="s5-desc" style="color:#888;font-size:15px;margin-top:4px;"></p>
        <p id="s5-disclaimer" style="color:#bbb;font-size:11px;margin-top:6px;font-style:italic;"></p>
      </div>

function getCookie(n){const m=document.cookie.match(new RegExp('(?:^|; )'+n+'=([^;]*)'));return m?decodeURIComponent(m[1]):null;}
function setCookie(n,v,days){const d=new Date();d.setTime(d.getTime()+days*864e5);document.cookie=n+'='+encodeURIComponent(v)+';expires='+d.toUTCString()+';path=/;SameSite=Lax';}

function detectLang() {
  // 1. Cookie first
  const saved=getCookie('pic2ui_lang');
  if(saved&&['zh','en','ja'].includes(saved)) return saved;
  // 2. Browser language
  const bl=(navigator.language||navigator.userLanguage||'en').toLowerCase();
  if(bl.startsWith('zh')) return 'zh';
  if(bl.startsWith('ja')) return 'ja';
  // 3. IP-based (async, will update if different)
  tryIPDetect();
  return 'en';
}

function tryIPDetect() {
  // Best-effort: use free geo-IP to detect country → language
  fetch('https://ipapi.co/json/',{mode:'cors'}).then(r=>r.json()).then(d=>{
    const cc=d.country_code;
    let detected='en';
    if(['TW','HK','MO','CN'].includes(cc)) detected='zh';
    else if(cc==='JP') detected='ja';
    if(detected!==lang&&!getCookie('pic2ui_lang')) { lang=detected; setLang(detected); }
  }).catch(()=>{});
}

// EMAIL GATE + BROWSER RATE LIMIT
// ═══════════════════════════════════════════════
const DAILY_LIMIT = 5;

function getStoredEmail() { return getCookie('pic2ui_email') || ''; }
function setStoredEmail(email) { setCookie('pic2ui_email', email, 365); }

function isValidEmail(str) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(str.trim());
}

function getDailyUsage() {
  try {
    const raw = localStorage.getItem('pic2ui_usage');
    if (!raw) return { count: 0, date: '' };
    const d = JSON.parse(raw);
    const today = new Date().toISOString().slice(0, 10);
    if (d.date !== today) return { count: 0, date: today };
    return d;
  } catch(e) { return { count: 0, date: '' }; }
}

function incrementUsage() {
  const today = new Date().toISOString().slice(0, 10);
  const usage = getDailyUsage();
  if (usage.date !== today) {
    usage.count = 1; usage.date = today;
  } else {
    usage.count++;
  }
  localStorage.setItem('pic2ui_usage', JSON.stringify(usage));
  return usage;
}

function getRemainingUses() {
  const usage = getDailyUsage();
  const today = new Date().toISOString().slice(0, 10);
  if (usage.date !== today) return DAILY_LIMIT;
  return Math.max(0, DAILY_LIMIT - usage.count);
}

function isRateLimited() {
  return getRemainingUses() <= 0;
}

function validateEmailGate() {
  const input = document.getElementById('email-input');
  const error = document.getElementById('email-error');
  const cta = document.getElementById('s1-cta-btn');
  const val = input.value.trim();

  // Reset
  error.style.display = 'none';
  input.style.borderColor = '#ddd';

  // Check rate limit first
  if (isRateLimited()) {
    cta.disabled = true;
    input.style.borderColor = '#e05050';
    error.textContent = t(I.s1.rateLimitExceeded);
    error.style.display = 'block';
    return false;
  }

  // Need both image and valid email
  if (!imgDataUrl) {
    cta.disabled = true;
    return false;
  }

  if (!val) {
    cta.disabled = true;
    return false;
  }

  if (!isValidEmail(val)) {
    cta.disabled = true;
    if (val.length > 3) {
      input.style.borderColor = '#e05050';
      error.textContent = t(I.s1.emailError);
      error.style.display = 'block';
    }
    return false;
  }

  // Valid!
  input.style.borderColor = '#222';
  cta.disabled = false;
  return true;
}

function updateRateLimitNotice() {
  const el = document.getElementById('rate-limit-notice');
  if (!el) return;
  const remaining = getRemainingUses();
  if (isRateLimited()) {
    el.style.display = 'block';
    el.style.color = '#e05050';
    el.textContent = t(I.s1.rateLimitExceeded);
  } else {
    el.style.display = 'block';
    el.style.color = '#bbb';
    el.textContent = t(I.s1.rateLimitMsg).replace('{n}', DAILY_LIMIT).replace('{r}', remaining);
  }
}

function renderSidebar() {
  const labels = I.steps[lang];
  const bar = document.getElementById('wizard-bar');
  // Map internal step to wizard position
  const wizPos = STEP_MAP.indexOf(step);
  let html = '';
  for (let i = 0; i < STEP_COUNT; i++) {
    const done = i < wizPos, active = i === wizPos;
    const bg = done ? '#222' : active ? '#222' : '#e0e0e0';
    const fc = (done || active) ? '#fff' : '#aaa';
    const lc = active ? '#222' : done ? '#555' : '#bbb';
    const fw = active ? 600 : 400;
    const check = `<svg width="10" height="8" fill="none"><path d="M1 4l3 3L9 1" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    html += `<div class="wiz-step"><div class="wiz-num" style="background:${bg};color:${fc};">${done ? check : i+1}</div><span class="wiz-label" style="color:${lc};font-weight:${fw};">${labels[i]}</span></div>`;
    if (i < STEP_COUNT - 1) html += `<div class="wiz-line${done ? ' done' : ''}" style="margin:0 6px;"></div>`;
  }
  bar.innerHTML = html;
}

function showStep(n) {
  document.querySelectorAll('.step-content').forEach(el=>el.classList.remove('active'));
  document.getElementById(`step-${n}`).classList.add('active');
  // top-title removed; wizard bar shows current step

  // ─── Fixed footer action bar ───
  const footer = document.getElementById('action-footer');
  const afBack = document.getElementById('af-back');
  const afNext = document.getElementById('af-next');
  const afCenter = document.getElementById('af-center');
  const afExL = document.getElementById('af-extra-left');
  const afExR = document.getElementById('af-extra-right');

  // Steps 1, 2 = no footer (Step 1 has its own CTA, Step 2 is auto)
  // Step 6 = no footer (auto-processing)
  const showFooter = n >= 3 && n !== 6;
  footer.classList.toggle('hidden', !showFooter);
  document.querySelector('main').style.paddingBottom = showFooter ? '80px' : '24px';

  if (showFooter) {
    afBack.textContent = t(I.back);
    afBack.style.display = n > 1 ? '' : 'none';
    afExL.innerHTML = '';
    afExR.innerHTML = '';

    if (n === 3) {
      afNext.textContent = t(I.s3.next);
      afNext.style.display = '';
      afCenter.textContent = t(I.s3.title);
    } else if (n === 5) {
      // Step 5: Clear + Skip on left, "Start Processing" on right
      afExL.innerHTML = `<button id="s5-clear-btn" class="af-btn-secondary" onclick="clearAnnotations()"></button>`;
      afNext.textContent = t(I.s5.skip); // Skip / Process
      afNext.style.display = '';
      const _n=annotations.length; afCenter.textContent=_n>0?(lang==='zh'?`${_n} 個標注`:lang==='ja'?`${_n} 件の注釈`:`${_n} annotation${_n===1?'':'s'}`):'';

      setTimeout(() => {
        const cl=document.getElementById('s5-clear-btn');
        if(cl) cl.textContent=t(I.s5.clear);
        updateAnnotationFooter();
      }, 0);
    } else if (n === 7) {
      // Step 7: Edit buttons + restart on left, downloads on right

function handleNext() {
  if(step===1&&imgDataUrl) {
    // Email gate check
    const email = document.getElementById('email-input')?.value.trim();
    if (!isValidEmail(email)) { validateEmailGate(); return; }
    if (isRateLimited()) { validateEmailGate(); return; }
    // Save email + increment usage
    setStoredEmail(email);
    incrementUsage();
    updateRateLimitNotice();
    startAnalysis();
  }
  else if(step===2&&extractedColors.length>0) { buildColorTuningStep(); showStep(3); }
  else if(step===3) { buildDS(); buildAnnotationStep(); showStep(5); }
  else if(step===5) { startProcessing(); }
}
function prevStep() {
  if(step<=1) return;
  // Skip removed/auto steps when going back
  if(step===7) showStep(5); // back from results → annotations
  else if(step===6) showStep(5);
  else if(step===5) showStep(3); // skip removed Step 4
  else showStep(step-1);
}
function skipAnnotation() { startProcessing(); }

function restartPipeline() {
  // Reset all state
  imgDataUrl = null;
  extractedColors = [];
  DS = {};
  annotations = [];
  activeType = null;
  imgAvgLum = 128;
  colorRoles = {};
  colorSlots = {};
  // Reset upload UI
  document.getElementById('upload-placeholder').style.display = '';
  document.getElementById('upload-preview').style.display = 'none';
  document.getElementById('drop-zone').style.padding = '56px 24px';
  document.getElementById('file-input').value = '';
  document.getElementById('ui-kit-render').innerHTML = '';
  // Re-validate email gate (image is gone, so CTA disables)
  validateEmailGate();
  updateRateLimitNotice();
  document.getElementById('json-preview').textContent = '';
  // Go to step 1
  showStep(1);
}

// Navigate back from results to edit, preserving all state
function editFromResult(target) {
  if (target === 'colors') {
    // Go back to color tuning — rebuild the color step UI
    buildColorTuningStep();
    showStep(3);
  } else if (target === 'annotations') {
    // Go back to annotation step — canvas and annotations are still in memory
    showStep(5);
  }
}

// ═══════════════════════════════════════════════
// COLOR EXTRACTION
// ═══════════════════════════════════════════════
function extractColors(dataUrl,cb) {
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');c.width=c.height=160;
    const ctx=c.getContext('2d');ctx.drawImage(img,0,0,160,160);
    const d=ctx.getImageData(0,0,160,160).data;
    const map={};let totalPx=0,lumSum=0;
    for(let i=0;i<d.length;i+=16){
      if(d[i+3]<100)continue;
      const r=Math.round(d[i]/28)*28,g=Math.round(d[i+1]/28)*28,b=Math.round(d[i+2]/28)*28;
      const lum=r*.299+g*.587+b*.114;lumSum+=lum;totalPx++;
      const k=`${r},${g},${b}`;
      if(!map[k])map[k]={r,g,b,count:0,lum};map[k].count++;
    }
    imgAvgLum=totalPx?lumSum/totalPx:128;
    const sorted=Object.values(map).sort((a,b)=>b.count-a.count);
    const total=sorted.reduce((s,c)=>s+c.count,0);
    const candidates=sorted.slice(0,50).map(c=>({...c,hex:toHex(c.r,c.g,c.b),ratio:c.count/total}));
    const palette=[];
    for(const c of candidates){if(!palette.some(p=>colorDist(c,p)<48))palette.push(c);if(palette.length>=7)break;}
    if(!palette.find(c=>c.lum>200))palette.push({hex:'#f0f0f0',r:240,g:240,b:240,lum:240,ratio:.05});
    if(!palette.find(c=>c.lum<60))palette.push({hex:'#1a1a1a',r:26,g:26,b:26,lum:26,ratio:.05});
    cb(palette.slice(0,7));
  };
  img.src=dataUrl;
}
function colorDist(a,b){return Math.sqrt((a.r-b.r)**2+(a.g-b.g)**2+(a.b-b.b)**2);}
function toHex(r,g,b){return '#'+[r,g,b].map(v=>Math.min(255,v).toString(16).padStart(2,'0')).join('');}
function isLight(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(r*299+g*587+b*114)/1000>145;}
function ha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function darken(hex,n){const r=Math.max(0,parseInt(hex.slice(1,3),16)-n),g=Math.max(0,parseInt(hex.slice(3,5),16)-n),b=Math.max(0,parseInt(hex.slice(5,7),16)-n);return toHex(r,g,b);}
function lighten(hex,n){const r=Math.min(255,parseInt(hex.slice(1,3),16)+n),g=Math.min(255,parseInt(hex.slice(3,5),16)+n),b=Math.min(255,parseInt(hex.slice(5,7),16)+n);return toHex(r,g,b);}
function hexToRgb(hex){return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};}

  setTimeout(()=>{
    if(!extractedColors.length) extractedColors=[{hex:'#6366f1',r:99,g:102,b:241,lum:110,ratio:.3},{hex:'#8b5cf6',r:139,g:92,b:246,lum:110,ratio:.2},{hex:'#f0f0f0',r:240,g:240,b:240,lum:240,ratio:.15},{hex:'#1a1a1a',r:26,g:26,b:26,lum:26,ratio:.15}];
    // Auto-assign initial roles

}

// ═══════════════════════════════════════════════
// COLOR TUNING (step 3) — NEW
// ═══════════════════════════════════════════════
function autoAssignSlots() {
  colorSlots = {};
  const cols = extractedColors;
  // Helpers
  const byLum = [...cols].sort((a,b) => a.lum - b.lum);
  const bySat = [...cols].sort((a,b) => {
    const satA = Math.max(a.r,a.g,a.b) - Math.min(a.r,a.g,a.b);
    const satB = Math.max(b.r,b.g,b.b) - Math.min(b.r,b.g,b.b);
    return satB - satA; // most saturated first
  });
  const midTones = bySat.filter(c => c.lum > 40 && c.lum < 200);

  // Primary = most saturated mid-tone
  colorSlots.primary = midTones[0]?.hex || cols[0]?.hex || '#6366f1';
  // Secondary = second most saturated
  colorSlots.secondary = midTones[1]?.hex || cols[1]?.hex || '#8b5cf6';
  // Accent = third
  colorSlots.accent = midTones[2]?.hex || cols[2]?.hex || '#ec4899';
  // Surface = brightest
  colorSlots.surface = (byLum.find(c => c.lum > 200) || byLum[byLum.length - 1])?.hex || '#f5f5f5';
  // Text = darkest
  colorSlots.text = (byLum.find(c => c.lum < 60) || byLum[0])?.hex || '#1a1a1a';
  // Border = text at 14% alpha equivalent
  colorSlots.border = ha(colorSlots.text, 0.14);
  // Feedback colors — check if palette has close matches, otherwise use defaults
  const findClose = (targetR, targetG, targetB) => {
    return cols.find(c => {
      const dr = Math.abs(c.r - targetR), dg = Math.abs(c.g - targetG), db = Math.abs(c.b - targetB);
      return dr + dg + db < 180; // loose match
    });
  };
  colorSlots.success = findClose(34, 197, 94)?.hex || '#22c55e';
  colorSlots.warning = findClose(245, 158, 11)?.hex || '#f59e0b';
  colorSlots.danger = findClose(239, 68, 68)?.hex || '#ef4444';
  colorSlots.info = colorSlots.accent;

  // Legacy compat
  colorRoles = {};
  const priIdx = cols.findIndex(c => c.hex === colorSlots.primary);
  if (priIdx >= 0) colorRoles[priIdx] = 'primary';
  const secIdx = cols.findIndex(c => c.hex === colorSlots.secondary);
  if (secIdx >= 0) colorRoles[secIdx] = 'secondary';
}

function buildColorTuningStep() {
  renderPaletteGrid();
  renderSlotGrid();
}

function renderPaletteGrid() {
  const grid = document.getElementById('palette-grid');
  let html = extractedColors.map((c, i) => {
    const tc = isLight(c.hex) ? '#333' : '#fff';
    // Find which slots use this color
    const usedBy = SLOT_IDS.filter(s => colorSlots[s] === c.hex);
    const usedLabel = usedBy.length ? usedBy.map(s => SLOT_ICONS[s]).join('') : '';
    return `<div style="text-align:center;position:relative;">
      <div class="color-chip" style="width:72px;height:56px;border-radius:10px;background:${c.hex};border:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;">
        <input type="color" value="${c.hex}" onchange="updateColor(${i},this.value)">
        ${usedLabel ? `<span style="font-size:10px;color:${tc};pointer-events:none;opacity:.7;">${usedLabel}</span>` : ''}
      </div>

      ${extractedColors.length > 3 ? `<button onclick="removeColor(${i})" style="position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;border:1px solid #ddd;background:#fff;font-size:9px;color:#999;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;">✕</button>` : ''}

  }).join('');

  html += `<div style="text-align:center;">
    <button onclick="addColor()" style="width:72px;height:56px;border-radius:10px;border:2px dashed #ddd;background:#fafafa;cursor:pointer;font-size:18px;color:#bbb;display:flex;align-items:center;justify-content:center;">+</button>

function renderSlotGrid() {

function updateColor(idx, newHex) {
  const rgb = hexToRgb(newHex);
  const oldHex = extractedColors[idx].hex;
  extractedColors[idx].hex = newHex;
  extractedColors[idx].r = rgb.r; extractedColors[idx].g = rgb.g; extractedColors[idx].b = rgb.b;
  extractedColors[idx].lum = rgb.r * .299 + rgb.g * .587 + rgb.b * .114;
  // Update any slots that were using the old color
  for (const s of SLOT_IDS) {
    if (colorSlots[s] === oldHex) colorSlots[s] = newHex;
  }
  buildColorTuningStep();
}

function addColor() {
  extractedColors.push({ hex: '#888888', r: 136, g: 136, b: 136, lum: 136, ratio: 0.05 });
  buildColorTuningStep();
}

function removeColor(idx) {
  if (extractedColors.length <= 3) return;
  const removedHex = extractedColors[idx].hex;
  extractedColors.splice(idx, 1);
  // If any slot used this color, reset to a default
  for (const s of SLOT_IDS) {
    if (colorSlots[s] === removedHex) {
      colorSlots[s] = extractedColors[0]?.hex || '#888';
    }
  }
  buildColorTuningStep();
}

function updateSlot(slotId, hex) {
  colorSlots[slotId] = hex;
  buildColorTuningStep();
}

function pickSlotFromPalette(slotId, value) {
  if (value === '__custom__') {
    // Trigger color picker by clicking the hidden input
    const chip = document.querySelector(`[onchange="updateSlot('${slotId}',this.value)"]`);
    if (chip) chip.click();
    return;
  }
  if (value) colorSlots[slotId] = value;
  buildColorTuningStep();
}

function getRole(role) {
  // Legacy compat — prefer colorSlots, fall back to colorRoles index lookup
  if (colorSlots[role]) return colorSlots[role];
  const idx=Object.entries(colorRoles).find(([k,v])=>v===role)?.[0];
  return idx!==undefined?extractedColors[idx]?.hex:null;
}
function buildDS() {
  const primary=colorSlots.primary||extractedColors[0]?.hex||'#888';
  const secondary=colorSlots.secondary||extractedColors[1]?.hex||'#666';
  const accent=colorSlots.accent||extractedColors[2]?.hex||'#aaa';
  const surface=colorSlots.surface||extractedColors.find(c=>c.lum>200)?.hex||'#f0f0f0';
  const text=colorSlots.text||extractedColors.find(c=>c.lum<60)?.hex||'#1a1a1a';
  const border=colorSlots.border||ha((imgAvgLum<128)?surface:text,.14);
  const isDark=imgAvgLum<128;

  // Derive typography scale from image dimensions
  // Use image width as proxy for design viewport — scale relative to 1440px baseline
  const canvas = document.getElementById('anno-canvas');
  const imgW = canvas?._img?.naturalWidth || 1440;
  const imgH = canvas?._img?.naturalHeight || 900;
  const scaleFactor = Math.max(0.75, Math.min(1.35, imgW / 1440));
  // Content density heuristic: taller images relative to width suggest denser content → smaller type
  const aspectRatio = imgW / imgH;
  const densityAdj = aspectRatio < 0.8 ? 0.9 : aspectRatio > 2 ? 1.05 : 1;
  const sf = scaleFactor * densityAdj;
  const round = (v) => Math.round(v);
  const typo = [
    { name:'Display', size: round(36*sf)+'px', weight:'800', lh:'1.15' },
    { name:'H1',      size: round(28*sf)+'px', weight:'700', lh:'1.25' },
    { name:'H2',      size: round(22*sf)+'px', weight:'600', lh:'1.35' },
    { name:'Body',    size: round(16*sf)+'px', weight:'400', lh:'1.65' },
    { name:'Small',   size: round(14*sf)+'px', weight:'400', lh:'1.55' },
    { name:'Caption', size: round(12*sf)+'px', weight:'500', lh:'1.4' },
  ];

  DS={isDark,
    colors:{primary,secondary,accent,surface,text,border,
      success:colorSlots.success||'#22c55e',warning:colorSlots.warning||'#f59e0b',
      danger:colorSlots.danger||'#ef4444',info:colorSlots.info||accent},
    allColors:extractedColors.map(c=>c.hex),
    colorRatios:extractedColors.map(c=>c.ratio),
    imageInfo:{ width:imgW, height:imgH, scaleFactor:Math.round(sf*100)/100 },
    typo,
    spacing:[4,8,12,16,24,32,48,64].map(v=>Math.round(v*sf)),
    radius:{sm:round(4*sf)+'px',md:round(8*sf)+'px',lg:round(16*sf)+'px',xl:round(24*sf)+'px',full:'999px'},
    shadows:{sm:isDark?'0 1px 4px rgba(0,0,0,.4)':'0 1px 3px rgba(0,0,0,.08)',md:isDark?'0 4px 16px rgba(0,0,0,.5)':'0 4px 14px rgba(0,0,0,.09)',lg:isDark?'0 10px 30px rgba(0,0,0,.6)':'0 10px 28px rgba(0,0,0,.12)'},
  };
}

  // Render type panel as horizontal grouped chips
  document.getElementById('type-panel').innerHTML=COMP_TYPES.map(cat=>`
    <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;">

  const img=new Image();

  };
  img.src=imgDataUrl;
  annotations=[];renderAnnoList();
}

function setupCanvas(canvas) {
  canvas.addEventListener('mousedown',e=>{if(!activeType)return;drawing=true;const r=canvas.getBoundingClientRect();sx=e.clientX-r.left;sy=e.clientY-r.top;});
  canvas.addEventListener('mousemove',e=>{if(!drawing)return;const r=canvas.getBoundingClientRect();redrawCanvas(canvas,e.clientX-r.left,e.clientY-r.top);});
  canvas.addEventListener('mouseup',e=>{
    if(!drawing)return;drawing=false;
    const r=canvas.getBoundingClientRect(),ex=e.clientX-r.left,ey=e.clientY-r.top;
    const w=Math.abs(ex-sx),h=Math.abs(ey-sy);
    if(w<12||h<12){redrawCanvas(canvas);return;}
    const ax=Math.min(sx,ex), ay=Math.min(sy,ey);
    const visual = analyzeAnnotationRegion(canvas, ax, ay, w, h);
    annotations.push({id:Date.now(),x:ax,y:ay,w,h,typeId:activeType.id,label:activeType.label,color:activeType.color,visual});
    inferAnnotationVariants();
    redrawCanvas(canvas);renderAnnoList();updateAnnotationFooter();
  });
}

function redrawCanvas(canvas,dx,dy) {
  if(!canvas)canvas=document.getElementById('anno-canvas');
  const ctx=canvas.getContext('2d');
  if(canvas._img)ctx.drawImage(canvas._img,0,0,canvas.width,canvas.height);
  for(const a of annotations) {
    // Semi-transparent fill so image shows through
    ctx.fillStyle=ha(a.color,.15);ctx.fillRect(a.x,a.y,a.w,a.h);
    ctx.strokeStyle=ha(a.color,.7);ctx.lineWidth=2;ctx.setLineDash([4,3]);ctx.strokeRect(a.x,a.y,a.w,a.h);ctx.setLineDash([]);
    // Label bg
    const lw=ctx.measureText(a.label).width+8;
    ctx.fillStyle=ha(a.color,.75);ctx.font='bold 11px sans-serif';
    ctx.fillRect(a.x,a.y-16,lw,16);
    ctx.fillStyle='#fff';ctx.fillText(a.label,a.x+4,a.y-4);
  }
  if(drawing&&dx!==undefined&&activeType) {
    ctx.fillStyle=ha(activeType.color,.08);ctx.fillRect(sx,sy,dx-sx,dy-sy);
    ctx.strokeStyle=ha(activeType.color,.5);ctx.lineWidth=2;ctx.setLineDash([5,3]);ctx.strokeRect(sx,sy,dx-sx,dy-sy);ctx.setLineDash([]);
  }
}

// ═══════════════════════════════════════════════
// ANNOTATION REGION ANALYSIS — crop + extract visual data
// ═══════════════════════════════════════════════
function analyzeAnnotationRegion(canvas, x, y, w, h) {
  // Crop the annotated region from the canvas
  const ctx = canvas.getContext('2d');
  const imgData = ctx.getImageData(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
  const px = imgData.data;
  const totalPx = px.length / 4;

  // 1. Collect all pixel colors, compute average luminance
  let sumR=0, sumG=0, sumB=0;
  const colorBuckets = {};
  for (let i = 0; i < px.length; i += 4) {
    const r=px[i], g=px[i+1], b=px[i+2], a=px[i+3];
    if (a < 128) continue; // skip transparent
    sumR += r; sumG += g; sumB += b;
    // Quantize to 4-bit for bucketing
    const qr = (r >> 4) << 4, qg = (g >> 4) << 4, qb = (b >> 4) << 4;
    const key = `${qr},${qg},${qb}`;
    colorBuckets[key] = (colorBuckets[key] || 0) + 1;
  }

  // 2. Sort buckets → top 3 dominant colors
  const sorted = Object.entries(colorBuckets).sort((a,b) => b[1]-a[1]);
  const dominantColors = sorted.slice(0, 3).map(([key, count]) => {
    const [r,g,b] = key.split(',').map(Number);
    return { hex: toHex(r,g,b), ratio: Math.round((count/totalPx)*100) };
  });

  // 3. Average color
  const avgR = Math.round(sumR/totalPx), avgG = Math.round(sumG/totalPx), avgB = Math.round(sumB/totalPx);
  const avgHex = toHex(avgR, avgG, avgB);
  const avgLum = (avgR*299 + avgG*587 + avgB*114) / 1000;

  // 4. Background vs foreground guess — most dominant = bg, 2nd = fg
  const bgColor = dominantColors[0]?.hex || avgHex;
  const fgColor = dominantColors[1]?.hex || (avgLum > 128 ? '#333333' : '#ffffff');

  // 5. Estimate border radius from region size (heuristic)
  const minDim = Math.min(w, h);
  const estimatedRadius = minDim < 30 ? 4 : minDim < 60 ? 8 : minDim < 120 ? 12 : 16;

  // 6. Generate a thumbnail data URL for preview
  const thumbCanvas = document.createElement('canvas');
  const thumbScale = Math.min(80/w, 60/h, 1);
  thumbCanvas.width = Math.round(w * thumbScale);
  thumbCanvas.height = Math.round(h * thumbScale);
  const tCtx = thumbCanvas.getContext('2d');
  tCtx.drawImage(canvas, x, y, w, h, 0, 0, thumbCanvas.width, thumbCanvas.height);
  const thumbnail = thumbCanvas.toDataURL('image/png', 0.6);

  return {
    dominantColors,
    avgColor: avgHex,
    avgLum,
    bgColor,
    fgColor,
    estimatedRadius,
    thumbnail,
    width: Math.round(w),
    height: Math.round(h),
    aspectRatio: Math.round((w/h)*100)/100,
    inferredSize: w*h < 1500 ? 'xs' : w*h < 4000 ? 'sm' : w*h < 10000 ? 'md' : w*h < 25000 ? 'lg' : 'xl',
    inferredVariant: null, // will be set during grouping
  };
}

}
function getDevKeys() {

}

// Direct API call (no Worker) — for local testing
async function directAPICall(imageBase64, prompt, maxTokens) {
  const dev = getDevKeys();
  const provider = selectedProvider === 'auto' ?
    (dev.gemini ? 'gemini-flash' : dev.openai ? 'gpt4o-mini' : 'claude-haiku') : selectedProvider;

  const mediaType = imageBase64.startsWith('/9j/') ? 'image/jpeg' : imageBase64.startsWith('iVBOR') ? 'image/png' : 'image/png';

  if (provider.startsWith('claude')) {
    if (!dev.anthropic) throw new Error('No Anthropic API key configured');
    const model = provider === 'claude-sonnet' ? 'claude-sonnet-4-20250514' : 'claude-haiku-4-5-20251001';
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': dev.anthropic, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model, max_tokens: maxTokens, messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: mediaType, data: imageBase64 } },
        { type: 'text', text: prompt }
      ]}]}),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error?.message || 'Claude API error');
    const text = data.content?.[0]?.text || '';
    return { text, parsed: tryParseJSON(text) };
  }

  if (provider.startsWith('gpt')) {
    if (!dev.openai) throw new Error('No OpenAI API key configured');
    const model = provider === 'gpt4o' ? 'gpt-4o' : 'gpt-4o-mini';
    const resp = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${dev.openai}` },
      body: JSON.stringify({ model, max_tokens: maxTokens, messages: [{ role: 'user', content: [
        { type: 'image_url', image_url: { url: `data:${mediaType};base64,${imageBase64}` } },
        { type: 'text', text: prompt }
      ]}]}),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error?.message || 'OpenAI API error');
    const text = data.choices?.[0]?.message?.content || '';
    return { text, parsed: tryParseJSON(text) };
  }

  if (provider === 'gemini-flash') {
    if (!dev.gemini) throw new Error('No Gemini API key configured');
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${dev.gemini}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [
        { inline_data: { mime_type: mediaType, data: imageBase64 } },
        { text: prompt }
      ]}], generationConfig: { maxOutputTokens: maxTokens, temperature: 0.2 } }),
    });
    const data = await resp.json();
    if (!resp.ok || data.error) throw new Error(data.error?.message || 'Gemini API error');
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    return { text, parsed: tryParseJSON(text) };
  }

  throw new Error(`No API key for provider: ${provider}`);
}

function tryParseJSON(text) {
  if (!text) return null;
  try { return JSON.parse(text.replace(/```json?\n?/g, '').replace(/```/g, '').trim()); } catch { return null; }
}

function cropAnnotationToBase64(canvas, x, y, w, h) {
  const crop = document.createElement('canvas');
  crop.width = Math.round(w);
  crop.height = Math.round(h);
  const ctx = crop.getContext('2d');
  ctx.drawImage(canvas, Math.round(x), Math.round(y), Math.round(w), Math.round(h), 0, 0, crop.width, crop.height);
  return crop.toDataURL('image/png').split(',')[1]; // raw base64
}

// AI ANALYSIS — grouped by typeId for relationship reasoning
// ═══════════════════════════════════════════════
async function analyzeAnnotationsWithAI(onProgress) {
  const canvas = document.getElementById('anno-canvas');
  if (!canvas || !annotations.length) return;

  const annosWithImages = annotations.filter(a => a.visual);
  if (!annosWithImages.length) return;

  const apiBase = window.PIC2UI_API_BASE || '';
  const email = getStoredEmail();
  const dev = getDevKeys();
  const hasDirectKey = dev.anthropic || dev.openai || dev.gemini;
  const analysisLog = [];

  // ── Helper: send image + prompt to AI ──
  async function callAI(base64, prompt, maxTokens) {
    let aiResult, usedProvider = selectedProvider || 'worker';
    if (apiBase) {
      const resp = await fetch(`${apiBase}/api/analyze-component`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image_base64: base64, prompt, email, provider: selectedProvider }),
      });
      if (!resp.ok) throw new Error(`Worker API error ${resp.status}`);
      const data = await resp.json();
      aiResult = data.parsed
        || tryParseJSON(data.result?.content?.[0]?.text)
        || tryParseJSON(data.result?.choices?.[0]?.message?.content);
      usedProvider = data.provider || usedProvider;
    } else {
      console.log(`[Dev] Direct API call (${selectedProvider})`);
      const result = await directAPICall(base64, prompt, maxTokens);
      aiResult = result.parsed;
    }
    return { aiResult, usedProvider };
  }

  // ── Step 1: Group annotations by typeId ──
  const groups = {};
  for (const a of annosWithImages) {
    if (!groups[a.typeId]) groups[a.typeId] = [];
    groups[a.typeId].push(a);
  }

  let progressIdx = 0;
  const totalAnnotations = annosWithImages.length;

  // ── Step 2: Process each group ──
  for (const [typeId, groupAnnos] of Object.entries(groups)) {

    // ── 2a: Single annotation → individual analysis (original flow) ──
    if (groupAnnos.length === 1) {
      const a = groupAnnos[0];
      if (onProgress) onProgress(progressIdx, totalAnnotations, a.label, a.typeId);
      progressIdx++;

      if (!apiBase && !hasDirectKey) {
        analysisLog.push({ label: a.label, typeId, method: 'local', reason: 'No API key' });
        enhancedLocalAnalysis(a);
        continue;
      }
      try {
        const base64 = cropAnnotationToBase64(canvas, a.x, a.y, a.w, a.h);
        const prompt = buildComponentPrompt(typeId, a.label);
        const { aiResult, usedProvider } = await callAI(base64, prompt, 1024);
        if (aiResult) {
          a.aiCSS = aiResult;
          a._relationship = { axis: 'single', role: aiResult.variant || 'primary', confidence: aiResult.confidence || 0.7 };
          analysisLog.push({ label: a.label, typeId, method: 'ai', provider: usedProvider });
        } else {
          enhancedLocalAnalysis(a);
          analysisLog.push({ label: a.label, typeId, method: 'local', reason: 'AI returned no JSON' });
        }
      } catch(e) {
        console.warn('AI analysis error:', e);
        enhancedLocalAnalysis(a);
        analysisLog.push({ label: a.label, typeId, method: 'local', reason: e.message });
      }
      continue;
    }

    // ── 2b: Multiple annotations of same type → GROUPED COMPARISON ──
    if (onProgress) onProgress(progressIdx, totalAnnotations, `${groupAnnos[0].label} (×${groupAnnos.length})`, typeId);

    if (!apiBase && !hasDirectKey) {
      // No API → enhanced local analysis for each + local relationship inference
      groupAnnos.forEach(a => {
        enhancedLocalAnalysis(a);
        analysisLog.push({ label: a.label, typeId, method: 'local', reason: 'No API key' });
      });
      localGroupRelationship(groupAnnos, typeId);
      progressIdx += groupAnnos.length;
      continue;
    }

    try {
      // Composite all crops into one image
      const compositeBase64 = compositeAnnotationCrops(canvas, groupAnnos);
      const prompt = buildGroupedComparisonPrompt(typeId, groupAnnos[0].label, groupAnnos.length);
      // Larger token budget for grouped analysis
      const { aiResult, usedProvider } = await callAI(compositeBase64, prompt, 2048);

      if (aiResult && aiResult.items && aiResult.items.length === groupAnnos.length) {
        // ── Success: AI returned grouped analysis ──
        const relationship = aiResult.relationship || 'variants';
        const axis = aiResult.axis || VARIATION_AXIS[typeId]?.axis || 'variant';

        groupAnnos.forEach((a, i) => {
          const item = aiResult.items[i];
          // Merge per-item CSS into annotation
          a.aiCSS = { ...item };
          delete a.aiCSS.index;
          delete a.aiCSS.role;
          delete a.aiCSS.description;
          // Store relationship metadata
          a._relationship = {
            groupRelationship: relationship,
            axis: axis,
            role: item.role || `${relationship}-${i}`,
            description: item.description || '',
            confidence: aiResult.confidence || 0.7,
            reasoning: aiResult.reasoning || '',
          };
          // Update the visual inferredVariant from AI
          if (a.visual) {
            a.visual.inferredVariant = item.role || a.visual.inferredVariant;
          }
          analysisLog.push({ label: a.label, typeId, method: 'ai-grouped', provider: usedProvider, relationship, role: item.role });
        });
        progressIdx += groupAnnos.length;
        console.log(`[Grouped] ${typeId} ×${groupAnnos.length}: ${relationship} (${axis}) — ${aiResult.reasoning}`);
      } else {
        // AI returned something but items count mismatch → fallback to individual
        console.warn(`[Grouped] ${typeId}: item count mismatch, falling back to individual analysis`);
        await fallbackIndividualAnalysis(groupAnnos, canvas, analysisLog, onProgress, progressIdx, totalAnnotations);
        progressIdx += groupAnnos.length;
      }
    } catch(e) {
      console.warn(`[Grouped] ${typeId} error:`, e.message, '→ falling back');
      // Fallback: try individual, then local
      await fallbackIndividualAnalysis(groupAnnos, canvas, analysisLog, onProgress, progressIdx, totalAnnotations);
      progressIdx += groupAnnos.length;
    }
  }

  window._analysisLog = analysisLog;
}

// Fallback: analyze each annotation individually when grouped fails
async function fallbackIndividualAnalysis(groupAnnos, canvas, analysisLog, onProgress, startIdx, total) {
  const apiBase = window.PIC2UI_API_BASE || '';
  const dev = getDevKeys();
  for (let i = 0; i < groupAnnos.length; i++) {
    const a = groupAnnos[i];
    if (onProgress) onProgress(startIdx + i, total, a.label, a.typeId);
    try {
      const base64 = cropAnnotationToBase64(canvas, a.x, a.y, a.w, a.h);
      const prompt = buildComponentPrompt(a.typeId, a.label);
      let aiResult, usedProvider = selectedProvider || 'worker';
      if (apiBase) {
        const resp = await fetch(`${apiBase}/api/analyze-component`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image_base64: base64, prompt, email: getStoredEmail(), provider: selectedProvider }),
        });
        if (resp.ok) {
          const data = await resp.json();
          aiResult = data.parsed || tryParseJSON(data.result?.content?.[0]?.text) || tryParseJSON(data.result?.choices?.[0]?.message?.content);
          usedProvider = data.provider || usedProvider;
        }
      } else if (dev.anthropic || dev.openai || dev.gemini) {
        const result = await directAPICall(base64, prompt, 1024);
        aiResult = result.parsed;
      }
      if (aiResult) {
        a.aiCSS = aiResult;
        analysisLog.push({ label: a.label, typeId: a.typeId, method: 'ai', provider: usedProvider });
      } else {
        enhancedLocalAnalysis(a);
        analysisLog.push({ label: a.label, typeId: a.typeId, method: 'local', reason: 'AI no JSON' });
      }
    } catch(e) {
      enhancedLocalAnalysis(a);
      analysisLog.push({ label: a.label, typeId: a.typeId, method: 'local', reason: e.message });
    }
  }
  // Apply local relationship inference after individual analysis
  localGroupRelationship(groupAnnos, groupAnnos[0]?.typeId);
}

// Local heuristic for group relationships when AI is unavailable
function localGroupRelationship(groupAnnos, typeId) {
  const va = VARIATION_AXIS[typeId] || { axis:'variant', weight:0.5 };

  // Compare visual similarity across the group
  const bgColors = groupAnnos.map(a => a.visual?.bgColor || '#888');
  const uniqueBgs = [...new Set(bgColors)];
  const allSameBg = uniqueBgs.length === 1;

  // Heuristic: if all backgrounds are similar → likely states, if different → likely variants/semantic
  let relationship, axis;
  if (va.axis === 'state' && allSameBg) {
    relationship = 'states'; axis = 'state';
  } else if (va.axis === 'semantic' && !allSameBg) {
    relationship = 'semantic'; axis = 'semantic';
  } else {
    relationship = allSameBg ? 'states' : 'variants'; axis = allSameBg ? 'state' : 'variant';
  }

  const variantNames = ['primary','secondary','tertiary','quaternary','quinary'];
  const stateNames = ['default','active','hover','focus','disabled'];
  const semanticNames = ['success','info','warning','danger','neutral'];

  groupAnnos.forEach((a, i) => {
    const namePool = axis === 'state' ? stateNames : axis === 'semantic' ? semanticNames : variantNames;
    const role = namePool[i] || `${axis}-${i+1}`;
    a._relationship = { groupRelationship: relationship, axis, role, confidence: 0.4, reasoning: 'local heuristic' };
    if (a.visual) a.visual.inferredVariant = role;
  });
}

// Enhanced local analysis (fallback when no API)
function enhancedLocalAnalysis(a) {
  const v = a.visual;
  if (!v) return a;

  // Better heuristic analysis from pixel data
  const bgIsLight = isLight(v.bgColor);
  const hasBorder = v.dominantColors.length >= 2 &&
    v.dominantColors[1].ratio > 5 && v.dominantColors[1].ratio < 20;

  // Determine variant from visual cues
  let variant = 'filled';
  if (v.avgLum > 220) variant = 'ghost';
  else if (v.avgLum > 180 && hasBorder) variant = 'outline';
  else if (v.avgLum > 160) variant = 'soft';

  const r = v.estimatedRadius;
  const sizeMap = { xs: '10px', sm: '12px', md: '14px', lg: '16px', xl: '18px' };
  const padMap = { xs: '4px 10px', sm: '6px 14px', md: '8px 18px', lg: '12px 24px', xl: '14px 32px' };

  a.aiCSS = {
    elementType: a.typeId,
    css: {
      backgroundColor: variant === 'ghost' || variant === 'outline' ? 'transparent' : v.bgColor,
      color: variant === 'ghost' || variant === 'outline' ? v.fgColor || v.bgColor : (bgIsLight ? '#333333' : '#ffffff'),
      borderRadius: r + 'px',
      border: variant === 'outline' ? `2px solid ${v.fgColor || v.bgColor}` : 'none',
      padding: padMap[v.inferredSize] || '8px 18px',
      fontSize: sizeMap[v.inferredSize] || '14px',
      fontWeight: '600',
      boxShadow: variant === 'filled' ? `0 4px 12px ${ha(v.bgColor, .25)}` : 'none',
    },
    variant,
    label: '',
    description: `${variant} ${a.label}, bg:${v.bgColor}, ${v.width}×${v.height}`,
  };
  return a;
}

// Group annotations by typeId → infer variant names
function inferAnnotationVariants() {
  // Pre-AI: assign initial variant names from pixel heuristics
  // Post-AI: this gets called again but skips annotations that already have AI-assigned roles
  const groups = {};
  for (const a of annotations) {
    if (!a.visual) continue;
    if (!groups[a.typeId]) groups[a.typeId] = [];
    groups[a.typeId].push(a);
  }
  for (const [typeId, items] of Object.entries(groups)) {
    // Skip if AI already assigned relationship roles for this group
    if (items.some(a => a._relationship?.groupRelationship)) continue;

    if (items.length === 1) {
      items[0].visual.inferredVariant = items[0].visual.inferredVariant || 'primary';
      continue;
    }
    // Fallback: pixel-based heuristic (only if no AI result)
    items.sort((a,b) => (b.visual.width*b.visual.height) - (a.visual.width*a.visual.height));
    const va = VARIATION_AXIS[typeId] || { axis:'variant' };
    const variantNames = ['primary','secondary','tertiary','quaternary','quinary'];
    const stateNames = ['default','active','hover','focus','disabled'];
    const namePool = va.axis === 'state' ? stateNames : variantNames;

    items.forEach((a, i) => {
      if (a.visual.inferredVariant) return; // already set by AI
      const v = a.visual;
      const isFilled = !isLight(v.bgColor);
      const isOutline = v.dominantColors.length > 1 && isLight(v.bgColor) && !isLight(v.fgColor);
      if (va.axis === 'state') {
        v.inferredVariant = namePool[i] || `state-${i+1}`;
      } else if (isFilled) {
        v.inferredVariant = i === 0 ? 'filled-primary' : `filled-${variantNames[i]||'extra'}`;
      } else if (isOutline) {
        v.inferredVariant = 'outline';
      } else {
        v.inferredVariant = namePool[i] || `variant-${i+1}`;
      }
    });
  }
}

// TOKEN I/O LOG
// ═══════════════════════════════════════════════
function renderTokenLog() {
  // Price table per provider ($/M tokens)
  const PRICE_MAP = {
    'claude-haiku': {in:0.25,out:1.25,model:'claude-haiku-4.5'},
    'claude-sonnet': {in:3,out:15,model:'claude-sonnet-4'},
    'gpt4o-mini': {in:0.15,out:0.60,model:'gpt-4o-mini'},
    'gpt4o': {in:2.5,out:10,model:'gpt-4o'},
    'gemini-flash': {in:0.075,out:0.30,model:'gemini-2.0-flash'},
  };
  // Resolve actual provider
  const dev = getDevKeys();
  let resolvedProvider = selectedProvider;
  if (resolvedProvider === 'auto') {
    resolvedProvider = dev.gemini ? 'gemini-flash' : dev.openai ? 'gpt4o-mini' : dev.anthropic ? 'claude-haiku' : 'claude-sonnet';
  }
  const pricing = PRICE_MAP[resolvedProvider] || PRICE_MAP['claude-sonnet'];
  const priceIn = pricing.in, priceOut = pricing.out, modelName = pricing.model;
  const nodes=[
    {name:'Vision Analysis',input:1200,output:850,desc:'Image → color/layout/component detection'},
    {name:'IR Mapping',input:2100,output:1500,desc:'Analysis → Design System IR JSON'},
    {name:'Code Generation',input:1800,output:3200,desc:'IR JSON → HTML/React component code'},
  ];
  const totalIn=nodes.reduce((s,n)=>s+n.input,0),totalOut=nodes.reduce((s,n)=>s+n.output,0);
  const totalCost=(totalIn*priceIn+totalOut*priceOut)/1000000;
  const muted=DS.isDark?'#666':'#999';const border=DS.colors.border;const hl=DS.colors.primary;
  return `<div style="margin-bottom:16px;font-size:14px;font-weight:600;">Pipeline Token Usage</div>
    <div style="border-radius:10px;overflow:hidden;border:1px solid ${border};font-size:12px;">
      <div style="display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 1fr;padding:8px 12px;background:${ha(hl,.08)};font-weight:700;color:${hl};">
        <span>Node</span><span>Model</span><span>In</span><span>Out</span><span>Est. Cost</span></div>
      ${nodes.map(n=>{const cost=((n.input*priceIn+n.output*priceOut)/1000000).toFixed(4);
        return `<div style="display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 1fr;padding:8px 12px;border-top:1px solid ${border};align-items:center;">
          <div><div style="font-weight:600;">${n.name}</div><div style="font-size:10px;color:${muted};margin-top:1px;">${n.desc}</div></div>
          <span style="font-family:monospace;font-size:11px;color:${muted};">${modelName}</span>
          <span style="font-family:monospace;">~${n.input.toLocaleString()}</span>
          <span style="font-family:monospace;">~${n.output.toLocaleString()}</span>
          <span style="font-family:monospace;color:${hl};">$${cost}</span></div>`;}).join('')}
      <div style="display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 1fr;padding:8px 12px;border-top:2px solid ${hl};font-weight:700;">
        <span>Total</span><span></span>
        <span style="font-family:monospace;">~${totalIn.toLocaleString()}</span>
        <span style="font-family:monospace;">~${totalOut.toLocaleString()}</span>
        <span style="font-family:monospace;color:${hl};">$${totalCost.toFixed(4)}</span></div></div>
    <div style="margin-top:10px;font-size:11px;color:${muted};">Pricing: input $${priceIn}/M · output $${priceOut}/M (${modelName})</div>`;
}

    }
  },
};

// Build per-type AI prompt
function buildComponentPrompt(typeId, label) {
  const meta = COMP_META[typeId];
  const cfg = COMP_SKELETON[typeId];
  if (!cfg) {
    return `You are a UI design analyst. Analyze this cropped UI element: "${label}".
Return ONLY valid JSON with these fields:
{ "bgColor":"#hex", "textColor":"#hex", "borderRadius":"Npx", "border":"none or value", "padding":"Npx Npx", "fontSize":"Npx", "shadow":"none or value", "variant":"primary|secondary|custom", "description":"brief factual description", "confidence": 0.0-1.0 }
Rules:
- Extract ONLY what you can directly observe in the image
- Do NOT guess brand guidelines or design system rules
- Use standard front-end naming conventions
- If uncertain about a value, omit it rather than guess
- confidence: 0.8+ if clearly visible, 0.5-0.8 if partially visible, <0.5 if mostly guessed
Return ONLY valid JSON, no markdown, no explanation.`;
  }
  const stateHint = cfg.multiMode === 'state'
    ? `\nDetermine which STATE this element is in (e.g., expanded/collapsed, on/off, checked/unchecked, focus/default/error/disabled). Include "state" in your JSON.`
    : `\nIf you see visual differences from the default, include "variant" (e.g., filled, outline, ghost, soft).`;
  const metaHint = meta ? `\nThis component type is "${meta.description}". Known variants: [${meta.variants.join(', ')}]. Known states: [${meta.states.join(', ')}].` : '';
  return `You are a UI design analyst extracting visual properties from a cropped screenshot.
This is a "${label}" component (type: ${typeId}).${metaHint}

Analyze the image and return ONLY valid JSON matching this schema:
${cfg.promptSlots}
${stateHint}

Also include these fields:
- "variant": observed variant name (use standard naming: filled, outline, ghost, soft, etc.)
- "description": brief factual description of what you see (1 sentence)
- "label": any visible text in the element
- "confidence": 0.0-1.0 (how confident you are in the extraction)

Strict rules:
- Extract ONLY what is directly visible in the image
- Do NOT invent brand colors or design rules not shown
- Do NOT assume Tailwind/CSS classes — only report raw CSS values
- If a property is not clearly visible, OMIT it from the JSON
- Use #hex for colors, Npx for dimensions
- confidence: 0.8+ clearly visible, 0.5-0.8 partially visible, <0.5 uncertain
Return ONLY valid JSON, no markdown, no code fences, no explanation.`;
}

// ═══════════════════════════════════════════════
// GROUPED COMPARISON PROMPT — multi-annotation relationship analysis
// ═══════════════════════════════════════════════
function buildGroupedComparisonPrompt(typeId, label, annotationCount) {
  const meta = COMP_META[typeId];
  const cfg = COMP_SKELETON[typeId];
  const va = VARIATION_AXIS[typeId] || { axis:'variant', weight:0.5, fallback:null, hint:'' };

  const axisExplanation = {
    variant: 'visual style variants (e.g., filled vs outline vs ghost — same component, different visual treatment)',
    state:   'interactive states (e.g., default vs focus vs error vs disabled — same component, different user interaction states)',
    semantic:'semantic/meaning variants (e.g., success vs warning vs danger vs info — same structure, different semantic purpose)',
    layout:  'layout variants (e.g., centered vs left-aligned vs split — same content type, different spatial arrangement)',
  };

  const variantList = meta ? `Known variants: [${meta.variants.join(', ')}].` : '';
  const stateList = meta ? `Known states: [${meta.states.join(', ')}].` : '';

  return `You are a UI design analyst. You are shown ${annotationCount} cropped screenshots of "${label}" components (type: ${typeId}), arranged LEFT to RIGHT in a single composite image.
${meta ? `\nThis component is: "${meta.description}". ${variantList} ${stateList}` : ''}

Your primary task: DETERMINE THE RELATIONSHIP between these ${annotationCount} screenshots.

For this component type, the most likely axis of variation is: **${va.axis}** (${axisExplanation[va.axis]}).
${va.hint ? `\nHint: ${va.hint}` : ''}
${va.fallback ? `\nSecondary axis to consider: **${va.fallback}** (${axisExplanation[va.fallback]}).` : ''}

Return ONLY valid JSON with this structure:
{
  "relationship": "variants" | "states" | "semantic" | "independent",
  "axis": "${va.axis}" | "${va.fallback || 'variant'}" | "mixed",
  "reasoning": "one sentence explaining WHY you classified them this way",
  "confidence": 0.0-1.0,
  "items": [
    {
      "index": 0,
      "role": "descriptive name (e.g., filled-primary, outline, default-state, error-state, success-variant, etc.)",
      "description": "brief factual description of this specific screenshot",
      ${cfg ? `${cfg.promptSlots.slice(1)}` : `"bgColor":"#hex", "textColor":"#hex", "borderRadius":"Npx", "border":"none or value", "padding":"Npx Npx", "fontSize":"Npx" }`}
  ]
}

Classification rules:
- "variants": Different visual styles of the SAME component (e.g., filled button vs outline button). Shape/structure is similar, styling differs.
- "states": Different interactive states of ONE component (e.g., input default vs focus vs error). Same design, different interaction feedback.
- "semantic": Same structure, different meaning/color (e.g., success alert vs danger alert). Structure identical, color conveys meaning.
- "independent": Fundamentally different designs that happen to be the same component type. Structure, layout, or purpose is clearly different.

Strict rules:
- Analyze LEFT to RIGHT, index 0 = leftmost
- Extract ONLY what is directly visible
- Do NOT invent colors or styles not shown
- Use #hex for colors, Npx for dimensions
- The "role" field should use standard naming: filled, outline, ghost, soft, default, hover, focus, error, disabled, success, warning, danger, info, etc.
Return ONLY valid JSON, no markdown, no code fences.`;
}

/**
 * Composite multiple annotation crops into a single side-by-side image
 * Returns base64 PNG of the combined image
 */
function compositeAnnotationCrops(canvas, annotations) {
  const padding = 8;
  const labelHeight = 20;
  const crops = annotations.map((a, i) => {
    const w = Math.round(a.w), h = Math.round(a.h);
    const crop = document.createElement('canvas');
    crop.width = w; crop.height = h;
    const ctx = crop.getContext('2d');
    ctx.drawImage(canvas, Math.round(a.x), Math.round(a.y), w, h, 0, 0, w, h);
    return { canvas: crop, w, h, label: `#${i+1}`, annotation: a };
  });

  // Calculate composite dimensions
  const maxH = Math.max(...crops.map(c => c.h));
  const totalW = crops.reduce((sum, c) => sum + c.w + padding, 0) - padding;
  const compositeH = maxH + labelHeight + padding;

  const comp = document.createElement('canvas');
  comp.width = totalW;
  comp.height = compositeH;
  const ctx = comp.getContext('2d');

  // White background
  ctx.fillStyle = '#f0f0f0';
  ctx.fillRect(0, 0, totalW, compositeH);

  // Draw each crop with label
  let offsetX = 0;
  crops.forEach((c, i) => {
    // Label
    ctx.fillStyle = '#666';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(c.label, offsetX + c.w / 2, 14);
    // Crop image
    ctx.drawImage(c.canvas, offsetX, labelHeight);
    // Separator line
    if (i < crops.length - 1) {
      ctx.strokeStyle = '#ccc';
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(offsetX + c.w + padding / 2, 0);
      ctx.lineTo(offsetX + c.w + padding / 2, compositeH);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    offsetX += c.w + padding;
  });

  return comp.toDataURL('image/png').split(',')[1];
}

// ═══════════════════════════════════════════════
// ANNOTATED COMPONENT RENDERER — skeleton + slots
// ═══════════════════════════════════════════════
function renderAnnotatedSection(typeId) {
  const annos = annotations.filter(a => a.typeId === typeId && a.visual);
  if (!annos.length) return '';
  const {colors} = DS;
  const cfg = COMP_SKELETON[typeId];

  // Gather slots from each annotation's aiCSS
  const slots = annos.map(a => a.aiCSS || {});
  const hasAI = slots.some(s => s && (s.bgColor || s.css || s.variant || s.state));

  // Normalize: if aiCSS has a nested .css property, flatten it
  const normalizedSlots = slots.map(s => {
    if (s.css) return { ...s, ...s.css };
    return s;
  });

  let html = '';

  if (cfg && hasAI) {
    // Determine if multiple annos are states vs variants
    const isStateMode = cfg.multiMode === 'state';
    const hasMultipleStates = isStateMode && normalizedSlots.filter(s => s.state).length > 1;

    if (hasMultipleStates || (!isStateMode && normalizedSlots.length > 1)) {
      // ── Multiple: show each as separate rendered component ──
      const label = isStateMode ? 'STATES' : 'VARIANTS';
      html += `<div style="font-size:10px;font-weight:700;color:${colors.primary};letter-spacing:.06em;margin-bottom:10px;">${label} (${normalizedSlots.length})</div>`;
      html += `<div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start;">`;
      normalizedSlots.forEach((s, i) => {
        const stateLabel = s.state || s.variant || `#${i+1}`;
        html += `<div style="text-align:center;">
          <div style="font-size:9px;font-weight:700;color:#aaa;letter-spacing:.06em;margin-bottom:6px;">${stateLabel.toUpperCase()}</div>
          ${cfg.render(s, DS)}
        </div>`;
      });
      html += '</div>';
    } else {
      // ── Single: render the base override ──
      const s = normalizedSlots[0] || {};
      html += `<div style="font-size:10px;font-weight:700;color:${colors.primary};letter-spacing:.06em;margin-bottom:10px;">ANNOTATED STYLE</div>`;
      html += cfg.render(s, DS);
    }

    // Add design-system derived variants if available
    if (cfg.renderVariants && normalizedSlots.length > 0) {
      html += cfg.renderVariants(normalizedSlots, DS);
    }
  } else if (hasAI) {
    // No skeleton config but has AI data — generic rendering
    html += `<div style="font-size:10px;font-weight:700;color:${colors.primary};letter-spacing:.06em;margin-bottom:10px;">ANNOTATED STYLE</div>`;
    html += `<div style="display:flex;gap:10px;flex-wrap:wrap;">`;
    normalizedSlots.forEach((s, i) => {
      const bg=s.backgroundColor||s.bgColor||'#f5f5f5'; const fg=s.color||s.textColor||'#333';
      const r=s.borderRadius||'8px';
      html += `<div style="padding:${s.padding||'12px'};border-radius:${r};background:${bg};color:${fg};border:${s.border||'1px solid rgba(0,0,0,.08)'};min-width:100px;text-align:center;">
        <div style="font-size:11px;font-weight:700;margin-bottom:4px;">${s.variant||`#${i+1}`}</div>
        <div style="font-size:10px;opacity:.6;">${s.description||''}</div></div>`;
    });
    html += '</div>';
  } else {
    // No AI — pixel fallback
    html += `<div style="font-size:10px;font-weight:700;color:${colors.primary};letter-spacing:.06em;margin-bottom:10px;">EXTRACTED (${annos.length})</div>`;
    html += `<div style="display:flex;gap:10px;flex-wrap:wrap;">`;
    annos.forEach((a, i) => {
      const v=a.visual; const bg=v.bgColor; const fg=isLight(bg)?'#333':'#fff';
      html += `<div style="padding:12px;border-radius:${v.estimatedRadius}px;background:${bg};color:${fg};min-width:80px;text-align:center;border:1px solid ${ha(v.fgColor,.15)};">
        <div style="font-size:11px;font-weight:700;">${v.inferredVariant||`#${i+1}`}</div>
        <div style="font-size:9px;opacity:.5;">${v.width}×${v.height}</div></div>`;
    });
    html += '</div>';
  }

  return `<div style="margin-top:16px;padding-top:14px;border-top:1px dashed ${colors.border};">
    ${html}
  </div>`;
}

// BUILD UI KIT — ALL 25 components always shown

function buildUIKit() {
  const{isDark,colors,allColors}=DS;

  // If annotations exist, show annotated first (highlighted), then the rest
  let ordered;
  if(annotations.length>0){
    const annotated=new Set(annotations.map(a=>a.typeId));

        return `<div style="flex:1;min-width:70px;"><div style="height:56px;border-radius:10px;background:${hex};border:1px solid ${ha(kitFg,.06)};display:flex;align-items:flex-end;padding:8px;margin-bottom:6px;">

  const typoSection=`<div class="kit-section" style="background:${ha(colors.primary,.03)};border:1px solid ${DS.colors.border};">
    <div class="kit-section-label" style="color:${colors.primary};">TYPOGRAPHY</div>

      <div style="width:60px;font-size:10px;color:${ha(kitFg,.4)};font-family:monospace;flex-shrink:0;">${t.name}</div>
      <div style="font-size:${t.size};font-weight:${t.weight};line-height:${t.lh};">Sample Text</div>
      <div style="margin-left:auto;font-size:10px;font-family:monospace;opacity:.3;">${t.size}</div></div>`).join('')}
  </div>`;

  const annotatedSet=new Set(annotations.map(a=>a.typeId));
  const annoCountMap={};
  annotations.forEach(a=>{annoCountMap[a.typeId]=(annoCountMap[a.typeId]||0)+1;});

  const compSections=ordered.map(id=>{
    if(!R[id])return '';
    const isAnnotated=annotatedSet.has(id);
    const count=annoCountMap[id]||0;
    const badge=isAnnotated?`<span style="display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;background:${ha(colors.primary,.1)};color:${colors.primary};margin-left:8px;">⊕ ${count} Annotated</span>`:'';

  const providers = [...new Set(log.filter(l=>l.method==='ai').map(l=>l.provider))];

  document.getElementById('ui-kit-render').innerHTML=`
    <div style="background:${kitBg};color:${kitFg};border-radius:20px;padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;">
