        <div style="display:flex;align-items:center;gap:6px;">
          <div style="width:10px;height:10px;border-radius:50%;background:${colors.primary};"></div>
          <span style="font-size:11px;font-family:monospace;opacity:.4;">${isDark?'Dark':'Light'} · ${allColors.length} colors · 26 components</span></div>
      </div>
      ${paletteSection}${typoSection}${compSections}
    </div>`;

  // Populate JSON panel
  populateJSONPanel();
}

function getJSONOutput() {
  const{colors,allColors,typo,spacing,radius,shadows,isDark,colorRatios}=DS;
  const cssFramework = selectedCSSFramework || 'tailwind';

  // Build semantic tokens (flat dot-notation)
  const semanticTokens = buildSemanticTokens(colors, isDark);

  // Build annotated component data
  const annotatedGroups = {};
  for (const a of annotations) {
    if (!annotatedGroups[a.typeId]) annotatedGroups[a.typeId] = [];
    annotatedGroups[a.typeId].push(a);
  }

  // ALL 26 components — always present with full agent-ready schema
  const ALL_IDS = Object.keys(COMP_META);
  const components = {};
  let compConfidenceSum = 0;
  for (const tid of ALL_IDS) {
    const meta = COMP_META[tid];
    const comp = {
      description: meta.description,
      anatomy: meta.anatomy,
      variants: meta.variants,
      sizes: meta.sizes,
      states: meta.states,
      baseClass: meta.baseClass,
      sizeClasses: meta.sizeClasses,
      variantClasses: meta.variantClasses,
      stateRules: meta.stateRules,
      usageRules: meta.usageRules,
    };
    // Merge annotation-analyzed styles if present
    if (annotatedGroups[tid]) {
      const items = annotatedGroups[tid];
      comp.annotated = true;
      comp.annotationCount = items.length;
      comp.analyzedStyles = items.map(a => {
        const obj = {};
        if (a.aiCSS) {
          const slots = { ...a.aiCSS };
          if (slots.css) { Object.assign(slots, slots.css); delete slots.css; }
          obj.aiAnalyzed = slots;
        }
        if (a.visual) {
          obj.pixelExtracted = { bgColor: a.visual.bgColor, fgColor: a.visual.fgColor, inferredSize: a.visual.inferredSize, estimatedRadius: a.visual.estimatedRadius };
        }
        return obj;
      });
      compConfidenceSum += 0.85; // annotated → higher confidence
    } else {
      compConfidenceSum += 0.5; // template-only → moderate confidence
    }
    components[tid] = comp;
  }

  // Confidence scores
  const hasColors = allColors.length >= 3;
  const hasAnnotations = annotations.length > 0;
  const confidence = {
    tokens: hasColors ? 0.85 : 0.5,
    semanticTokens: hasColors ? 0.7 : 0.4,
    components: ALL_IDS.length > 0 ? Math.round((compConfidenceSum / ALL_IDS.length) * 100) / 100 : 0,
  };

  return {
    name: 'Custom Design System',
    generatedBy: 'Pic to UI',
    version: '2.0.0',
    mode: isDark ? 'dark' : 'light',
    cssFramework,
    tokens: {
      colors: { primary:colors.primary, secondary:colors.secondary, accent:colors.accent, surface:colors.surface, text:colors.text, border:colors.border },
      palette: allColors,
      paletteRatios: colorRatios?.map(r => Math.round(r * 100) / 100),
      typography: typo,
      spacing,
      radius,
      shadows,
    },
    semanticTokens,
    components,
    confidence,
  };
}

function populateJSONPanel() {
  const el=document.getElementById('json-preview');
  if(!el)return;
  try{
    const json=getJSONOutput();
    // Syntax highlight
    const str=JSON.stringify(json,null,2);
    el.innerHTML=str.replace(/(".*?")(\s*:\s*)/g,'<span style="color:#8b5cf6;">$1</span>$2')
      .replace(/:\s*(".*?")/g,': <span style="color:#059669;">$1</span>')
      .replace(/:\s*(\d+\.?\d*)/g,': <span style="color:#d97706;">$1</span>')
      .replace(/:\s*(true|false|null)/g,': <span style="color:#dc2626;">$1</span>');
  }catch(e){el.textContent='Error generating JSON';}
}

function copyJSON() {
  const json=getJSONOutput();
  const str=JSON.stringify(json,null,2);
  navigator.clipboard.writeText(str).then(()=>{
    const btn=document.getElementById('copy-json-btn');
    btn.textContent=t(I.s7.copied);setTimeout(()=>btn.textContent=t(I.s7.copy),1500);
  }).catch(()=>{
    const w=window.open('','_blank');
    if(w){w.document.write('<pre>'+str+'</pre>');w.document.close();}
  });
}

// ═══════════════════════════════════════════════
// DOWNLOADS — comprehensive spec
// ═══════════════════════════════════════════════
function dl(content,filename,mimeType) {
  try{const blob=new Blob([content],{type:mimeType});const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),200);
  }catch(e){const w=window.open('','_blank');
    if(w){w.document.write(`<html><head><title>${filename}</title></head><body><pre style="white-space:pre-wrap;font-size:13px;font-family:monospace;padding:20px;">${content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre></body></html>`);w.document.close();}
  }
}

function downloadJSON() {
  if(!DS.colors){alert('Complete pipeline first');return;}
  const out = getJSONOutput();
  dl(JSON.stringify(out,null,2),'design-system.json','application/json');
}

    ],
    en: [
      `# Pic to UI — Design System Skill`,``,
      `> Design System extracted from a reference image for use by coding agents.`,``,
      `**CSS Implementation: ${fwLabel}**`,``,
      `> ${(fwHint[cssFramework]||fwHint.tailwind).en}`,``,
      `---`,``,
      `## How to Use`,``,
      `### Claude Code / Cursor / Windsurf / Codex`,
      `1. Place this file in \`.claude/skills/\` or \`.cursorrules\` or \`codex.md\``,
      `2. Instruct the agent: "Follow the Design System in SKILL.md for UI implementation"`,
      `3. The agent will use the component structures, visual parameters, and variants below`,``,
    ],
    ja: [
      `# Pic to UI — デザインシステムスキル`,``,
      `> 参照画像から抽出したデザインシステム。コーディングエージェントが直接使用可能。`,``,
      `**CSS実装方式：${fwLabel}**`,``,
      `> ${(fwHint[cssFramework]||fwHint.tailwind).ja}`,``,
      `---`,``,
      `## 使用方法`,``,
      `### Claude Code / Cursor / Windsurf / Codex`,
      `1. このファイルを \`.claude/skills/\` または \`.cursorrules\` または \`codex.md\` に配置`,
      `2. エージェントに指示：「SKILL.mdのデザインシステムでUI実装して」`,
      `3. 以下のコンポーネント構造・視覚パラメータ・バリアントに基づいて自動生成`,``,
    ],
  };

  // ── Tokens section ──
  const spec = [
    `---`,``,
    `## Design Tokens`,``,
    '```',
    `Primary:    ${colors.primary}`,`Secondary:  ${colors.secondary}`,`Accent:     ${colors.accent}`,
    `Surface:    ${colors.surface}`,`Text:       ${colors.text}`,`Border:     ${colors.border}`,
    '```',``,
    `Mode: **${isDark?'Dark':'Light'}**`,``,
  ];

  // CSS Variables block if selected
  if (cssFramework === 'cssvar') {
    spec.push(`### CSS Variables Template`,``,`\`\`\`css`,`:root {`);
    spec.push(`  --color-primary: ${colors.primary};`,`  --color-secondary: ${colors.secondary};`,`  --color-accent: ${colors.accent};`);
    spec.push(`  --color-surface: ${colors.surface};`,`  --color-text: ${colors.text};`,`  --color-border: ${colors.border};`);
    allColors.forEach((c,i)=>{ if(i>=6) spec.push(`  --color-extra-${i-5}: ${c};`); });
    spec.push(`  --radius-sm: 4px;`,`  --radius-md: 8px;`,`  --radius-lg: 16px;`,`  --radius-xl: 24px;`);
    spec.push(`  --shadow-sm: ${DS.shadows.sm};`,`  --shadow-md: ${DS.shadows.md};`,`  --shadow-lg: ${DS.shadows.lg};`);
    spec.push(`}`,`\`\`\``,``);
  }

  // Tailwind config hint
  if (cssFramework === 'tailwind') {
    spec.push(`### Tailwind Config Mapping`,``,`\`\`\`js`,`// tailwind.config.js`,`module.exports = {`,`  theme: {`,`    extend: {`,`      colors: {`);
    spec.push(`        primary: '${colors.primary}',`,`        secondary: '${colors.secondary}',`,`        accent: '${colors.accent}',`);
    spec.push(`        surface: '${colors.surface}',`,`        'ds-text': '${colors.text}',`,`        'ds-border': '${colors.border}',`);
    spec.push(`        success: '${colors.success}',`,`        warning: '${colors.warning}',`,`        danger: '${colors.danger}',`,`        info: '${colors.info}',`);
    spec.push(`      }`,`    }`,`  }`,`}`,`\`\`\``,``);
  }

  spec.push(
    `### Palette`,``,
    ...allColors.map((c,i)=>`- \`${c}\`${DS.colorRatios?.[i]?` (${Math.round(DS.colorRatios[i]*100)}%)`:''}`),``,
    `### Rules`,``,
    `- NEVER use hardcoded colors outside this palette`,
    `- ${isDark?'Dark backgrounds + light text':'Light backgrounds + dark text'}`,
    `- Hover: 85% opacity · Focus: primary at 15% alpha, 3px ring`,
    `- Border radius: sm=4px, md=8px, lg=16px, xl=24px`,``
  );

  // ── Semantic Tokens section ──
  const semTokens = buildSemanticTokens(colors, isDark);
  spec.push(`### Semantic Tokens`,``,`\`\`\`json`,JSON.stringify(semTokens, null, 2),`\`\`\``,``);
  spec.push(`> Use semantic tokens instead of raw hex values: \`action.primary\` not \`${colors.primary}\``,``);

  // ── Component Specifications — ALL components, always ──
  spec.push(`---`,``,`## Component Specifications`,``,
    `> ALL components listed below with anatomy, props, variants, states, and usage rules.`,
    `> Components marked ⊕ were annotated from the reference image with AI-analyzed styles.`,``);

  // Gather annotated groups
  const groups = {};
  for (const a of annotations) {
    if (!groups[a.typeId]) groups[a.typeId] = [];
    groups[a.typeId].push(a);
  }

  // Output ALL components
  const allIDs = Object.keys(COMP_META);
  for (const tid of allIDs) {
    const meta = COMP_META[tid];
    const cfg = COMP_SKELETON[tid];
    const isAnnotated = !!groups[tid];
    const multiMode = cfg?.multiMode || 'variant';

    spec.push(`### ${isAnnotated?'⊕ ':''}${meta.description} (\`${tid}\`)`,``);
    spec.push(`- **Anatomy**: ${meta.anatomy.map(a=>`\`${a}\``).join(' → ')}`);
    spec.push(`- **Variants**: ${meta.variants.join(', ')}`);
    spec.push(`- **Sizes**: ${meta.sizes.join(', ')}`);
    spec.push(`- **States**: ${meta.states.join(', ')}`);
    spec.push(`- **Base class**: \`${meta.baseClass}\``);
    spec.push(``);

    // Variant classes (Tailwind)
    if (cssFramework === 'tailwind' && Object.keys(meta.variantClasses).length > 0) {
      spec.push(`**Variant classes:**`);
      for (const [v, cls] of Object.entries(meta.variantClasses)) {
        if (cls) spec.push(`- \`${v}\`: \`${cls}\``);
      }
      spec.push(``);
    }

    // Size classes
    if (Object.keys(meta.sizeClasses).length > 0) {
      spec.push(`**Size classes:**`);
      for (const [sz, cls] of Object.entries(meta.sizeClasses)) {
        spec.push(`- \`${sz}\`: \`${cls}\``);
      }
      spec.push(``);
    }

    // State rules
    if (Object.keys(meta.stateRules).length > 0) {
      spec.push(`**State rules:**`);
      for (const [st, rule] of Object.entries(meta.stateRules)) {
        spec.push(`- \`${st}\`: ${rule}`);
      }
      spec.push(``);
    }

    spec.push(`**Usage Rules**:`);
    meta.usageRules.forEach(r => spec.push(`- ${r}`));
    spec.push(``);

    // Annotated styles (if present)
    if (isAnnotated) {
      const items = groups[tid];
      spec.push(`**Annotated Styles (${items.length}):**`,``);
      items.forEach((a, i) => {
        const label = multiMode === 'state'
          ? `State ${i+1}` + (a.aiCSS?.state ? ` — ${a.aiCSS.state}` : '')
          : `Variant ${i+1}` + (a.aiCSS?.variant ? ` — ${a.aiCSS.variant}` : '');
        spec.push(`**${label}:**`);
        if (a.aiCSS) {
          const slots = { ...a.aiCSS };
          delete slots.elementType; delete slots.innerElements;
          if (slots.css) { Object.assign(slots, slots.css); delete slots.css; }
          spec.push(`\`\`\`json`, JSON.stringify(slots, null, 2), `\`\`\``,``);
        } else if (a.visual) {
          spec.push(`- bg: \`${a.visual.bgColor}\`, fg: \`${a.visual.fgColor}\`, radius: ~${a.visual.estimatedRadius}px, size: ${a.visual.inferredSize}`,``);
        }
      });
    }
    spec.push('');
  }

  spec.push(`---`,`*Generated by Pic to UI · ${new Date().toISOString().slice(0,10)}*`);
  const md = [...(skillIntro[lang]||skillIntro.en), ...spec].join('\n');
